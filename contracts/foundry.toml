[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "shanghai"
via_ir = false
remappings = [
    "@chainlink/contracts/=lib/chainlink-brownie-contracts/contracts/"
]
fs_permissions = [{ access = "read", path = "./script/" }]

[profile.default.fuzz]
runs = 256

[rpc_endpoints]
fuji = "${FUJI_RPC_URL}"
mainnet = "${AVAX_RPC_URL}"

[etherscan]
fuji = { key = "${SNOWTRACE_API_KEY}", url = "https://api-testnet.snowtrace.io/api" }
